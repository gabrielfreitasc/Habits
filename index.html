<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="roll-title">
        <img src="./assets/img/logo.svg" alt="Habits">
        <button class="register"><img src="./assets/img/plu.svg" alt="Adicionar"><div>Register my day</div></button>
    </header>

    <form id="form-habits">
        <div class="habits">
            <div class="habit" data-name="run">🏃‍♂️</div>
            <div class="habit" data-name="water">💧</div>
            <div class="habit" data-name="gym">💪</div>
            <div class="habit" data-name="sleep">💤</div>
            <div class="habit" data-name="study">📚</div>
            <div class="habit" data-name="food">🍕</div>
        </div>

        <div class="days"></div>

    </form>

    <script src="./assets/js/main.js"></script>
</body>
</html>
